<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Configuración Maestra</title>
</head>
<body>
<header class="header" id="main-header"></header>

<main class="main-content">

    <div class="top-bar">
        <div id="loader" class="loading-overlay">⌛ Procesando...</div>
        
        <div class="top-bar-title" style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
            <h1>⚙️ Configuración del Negocio</h1>
            <button class="btn-refresh" onclick="loadData()">🔄 Sincronizar</button>
        </div>
    </div>

    <div class="container">  

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-sucursal')">
                📍 Sucursales <span id="icon-form-sucursal">+</span>
            </button>
            <div id="form-sucursal" class="form-content">
                <form id="f-sucursal" onsubmit="handlePost(event, 'sucursal')">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
                        <div class="form-group"><label>Dirección</label><input type="text" name="direccion" required></div>
                        <div class="form-group"><label>Código</label><input type="text" name="codigo" required></div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-sucursal">Crear Sucursal</button>
                </form>
            </div>
            <div class="table-container">
                <table id="table-sucursal">
                    <thead><tr><th>Nombre</th><th>Dirección</th><th>Código</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-banco')">
                🏦 Cuentas de Banco <span id="icon-form-banco">+</span>
            </button>
            <div id="form-banco" class="form-content">
                <form id="f-banco" onsubmit="handlePost(event, 'banco')">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group">
                            <label>Nombre del Banco</label>
                            <input type="text" name="banco_nombre" required>
                        </div>
                        <div class="form-group">
                            <label>Número de Cuenta</label>
                            <input type="text" name="cuenta_numero" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-banco">Crear Cuenta de Banco</button>
                </form>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="🔍 Buscar banco..." onkeyup="filterTable('table-banco', this.value)">
            </div>
            <div class="table-container">
                <table id="table-banco">
                    <thead><tr><th>Banco</th><th>Cuenta</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-cuenta')">
                📓 Cuentas Contables <span id="icon-form-cuenta">+</span>
            </button>
            <div id="form-cuenta" class="form-content">
                <form id="f-cuenta" onsubmit="handlePost(event, 'cuenta')">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group">
                            <label>Nombre de la Cuenta</label>
                            <input type="text" name="nombre_cuenta" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-cuenta">Crear Cuenta Contable</button>
                </form>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="🔍 Buscar cuenta contable..." onkeyup="filterTable('table-cuenta', this.value)">
            </div>
            <div class="table-container">
                <table id="table-cuenta">
                    <thead><tr><th>Nombre de la Cuenta</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-tarjeta')">
                💳 Proveedores de Cobro <span id="icon-form-tarjeta">+</span>
            </button>
            <div id="form-tarjeta" class="form-content">
                <form id="f-tarjeta" onsubmit="handlePost(event, 'tarjeta')">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group"><label>Proveedor</label><input type="text" name="proveedor_nombre" required></div>
                        <div class="form-group"><label>Banco Destino</label><input type="text" name="banco_destino" required></div>
                        <div class="form-group"><label>Comisión %</label><input type="number" step="0.01" name="comision" required></div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-tarjeta">Crear Proveedor de Cobro</button>
                </form>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="🔍 Buscar proveedor..." onkeyup="filterTable('table-tarjeta', this.value)">
            </div>
            <div class="table-container">
                <table id="table-tarjeta">
                    <thead><tr><th>Proveedor</th><th>Banco</th><th>Comisión</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-mercancia')">
                📦 Proveedores de Mercancía <span id="icon-form-mercancia">+</span>
            </button>
            <div id="form-mercancia" class="form-content">
                <form id="f-mercancia" onsubmit="handlePost(event, 'mercancia')">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group"><label>Nombre / Empresa</label><input type="text" name="nombre_mercancia" required></div>
                        <div class="form-group"><label>RNC / Cédula</label><input type="text" name="rnc" required></div>
                        <div class="form-group"><label>Teléfono</label><input type="tel" name="telefono" required></div>
                        <div class="form-group"><label>Dirección</label><input type="text" name="direccion_mercancia" required></div>
                        <div class="form-group"><label>Días Crédito</label><input type="number" name="dias_credito" required></div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-mercancia">Crear Proveedor de Mercancía</button>
                </form>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="🔍 Buscar mercancía..." onkeyup="filterTable('table-mercancia', this.value)">
            </div>
            <div class="table-container">
                <table id="table-mercancia">
                    <thead><tr><th>Nombre</th><th>RNC</th><th>Tel.</th><th>Días</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <button class="collapsible-header" onclick="toggleSection('form-usuario')">
                👥 Usuarios <span id="icon-form-usuario">+</span>
            </button>
            <div id="form-usuario" class="form-content">
                <form id="f-usuario" onsubmit="handleUserPost(event)">
                    <input type="hidden" name="rowId">
                    <div class="grid-form">
                        <div class="form-group"><label>Nombre</label><input type="text" name="nombre_usuario" required></div>
                        <div class="form-group"><label>Apellido</label><input type="text" name="apellido_usuario" required></div>
                        <div class="form-group"><label>Usuario</label><input type="text" name="usuario" required></div>
                        <div class="form-group"><label>Contraseña</label><input type="password" name="password" id="pass1" required></div>
                        <div class="form-group"><label>Confirmar Contraseña</label><input type="password" id="pass2" required></div>
                    </div>
                    <button type="submit" class="btn-main" id="btn-usuario">Crear Usuario</button>
                </form>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="🔍 Buscar usuario..." onkeyup="filterTable('table-usuario', this.value)">
            </div>
            <div class="table-container">
                <table id="table-usuario">
                    <thead><tr><th>Nombre</th><th>Apellido</th><th>Usuario</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div> 
	</main>

<script>

  if (sessionStorage.getItem('session_active') !== 'true') {
      window.location.href = 'login.html';
  }


    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtFBNhe3YuVv0dZ65aw1l8HBC1pSUj5wCCq8WMAH4k0mqOSJ-dWqZD6pfzVyufbdVP/exec';

    document.addEventListener('DOMContentLoaded', loadData);

    function toggleSection(id) {
        const el = document.getElementById(id);
        const icon = document.getElementById('icon-' + id);
        const isOpen = el.classList.contains('active');
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.collapsible-header span').forEach(s => s.innerText = '+');
        if (!isOpen) { el.classList.add('active'); icon.innerText = '-'; }
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderTable('table-sucursal', data.sucursal, ['nombre', 'direccion', 'codigo'], 'sucursal');
            renderTable('table-banco', data.banco, ['banco_nombre', 'cuenta_numero'], 'banco');
            renderTable('table-tarjeta', data.tarjeta, ['proveedor_nombre', 'banco_destino', 'comision'], 'tarjeta');
            renderTable('table-mercancia', data.mercancia, ['nombre_mercancia', 'rnc', 'telefono', 'dias_credito'], 'mercancia');
            
            // Renderizado de las nuevas tablas
            renderTable('table-cuenta', data.cuenta, ['nombre_cuenta'], 'cuenta');
            renderTable('table-usuario', data.usuario, ['nombre_usuario', 'apellido_usuario', 'usuario'], 'usuario');
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function renderTable(id, data, keys, type) {
        const tbody = document.querySelector(`#${id} tbody`);
        tbody.innerHTML = '';
        if(!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="100%" style="text-align:center">Sin registros</td></tr>';
            return;
        }
        data.forEach(item => {
            const row = document.createElement('tr');
            keys.forEach(k => {
                const td = document.createElement('td');
                td.innerText = item[k] || '';
                row.appendChild(td);
            });
            const actionTd = document.createElement('td');
            actionTd.innerHTML = `<button class="btn-edit" onclick='startEdit(${JSON.stringify(item)}, "${type}")'>Editar</button>`;
            row.appendChild(actionTd);
            tbody.appendChild(row);
        });
    }

    function startEdit(item, type) {
        toggleSection('form-' + type);
        const form = document.getElementById('f-' + type);
        const btn = document.getElementById('btn-' + type);
        Object.keys(item).forEach(key => {
            const input = form.querySelector(`[name="${key}"]`);
            if (input) input.value = item[key];
        });
        
        // Limpiar contraseñas por seguridad si se edita un usuario
        if (type === 'usuario') {
            document.getElementById('pass1').value = '';
            document.getElementById('pass2').value = '';
        }

        btn.innerText = "Actualizar Registro";
        btn.classList.add('badge-update');
        window.scrollTo({ top: form.parentElement.offsetTop - 20, behavior: 'smooth' });
    }

    // Función especial para validar el usuario antes de enviar a Google Sheets
    function handleUserPost(e) {
        e.preventDefault();
        const pass1 = document.getElementById('pass1').value;
        const pass2 = document.getElementById('pass2').value;
        
        if (pass1 !== pass2) {
            alert("⚠️ Las contraseñas no coinciden. Por favor, verifícalas.");
            return;
        }
        
        // Si todo está correcto, llama a la función principal de envío
        handlePost(e, 'usuario');
    }

    async function handlePost(e, type) {
        e.preventDefault();
        showLoader(true);
        
        // Si viene del form de usuarios, e.target podría ser indefinido si lo llamamos desde handleUserPost
        const form = e.target.tagName === 'FORM' ? e.target : document.getElementById('f-' + type);
        const btn = document.getElementById('btn-' + type);
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.origen = type;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("¡Procesado correctamente!");
            form.reset();
            
            // Reiniciar botones
            btn.innerText = "Crear " + type.charAt(0).toUpperCase() + type.slice(1);
            if(type === 'cuenta') btn.innerText = "Crear Cuenta Contable"; // Ajuste de texto
            btn.classList.remove('badge-update');
            
            setTimeout(loadData, 1000); // Esperar un segundo para que Google Sheets procese
        } catch (err) { alert("Error al conectar."); }
        showLoader(false);
    }

    function filterTable(tableId, query) {
        const rows = document.querySelectorAll(`#${tableId} tbody tr`);
        const q = query.toLowerCase();
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(q) ? '' : 'none';
        });
    }

    function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
</script>
<script src="script.js"></script>
</body>
</html>
