<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Registro de Egresos</title>
    <style>

    </style>
</head>
<body>
<header class="header" id="main-header"></header>

<main class="main-content">
<div class="app">
<div class="container">


<div class="top-bar">
    <h2>Egresos</h2>
</div>


 <form id="formEgresos">
<div class="form-grid">
    <!-- FILA 1 -->
    <div class="col">
        <label>Fecha *</label>
        <input type="date" name="fecha" id="fecha" required>
    </div>

<div class="col">
    <label>Sucursal *</label>
    <select id="Sucursal" name="sucursales" required>
        <option value="">Cargando sucursales...</option>
    </select>
</div>
  

    <div class="col">
        <label>Proveedor</label>
        <input type="text" name="proveedor" placeholder="Nombre del proveedor">
    </div>

    <!-- FILA 2 -->
    <div class="col">
        <label>Concepto / Descripción *</label>
        <input type="text" name="concepto" placeholder="Detalle del gasto" required>
    </div>

<div class="col">
    <label>Cuenta Contable *</label>
    <select id="NombreCuentaTipo" name="cuentaContable" required>
        <option value="">Cargando cuentas...</option>
    </select>
</div>

    <div class="col">
        <label>Naturaleza</label>
        <select name="naturaleza">
            <option value="Variable">Variable</option>
            <option value="Fijo">Fijo</option>
        </select>
    </div>

    <!-- FILA 3 -->
    <div class="col">
        <label>Monto Total del Gasto *</label>
        <input type="number" step="0.01" name="total" id="total" placeholder="0.00" required>
    </div>

    <div class="col">
        <label>Origen de Fondos (Pago)</label>
        <select name="origenFondos" id="origenFondos">
            <option value="No aplica">No descontar (Solo registro)</option>
            <option value="Efectivo Caja">Efectivo Caja</option>
            <option value="Banco Banreservas">Banco Banreservas</option>
            <option value="Banco Popular">Banco Popular</option>
            <option value="Banco BHD">Banco BHD</option>
        </select>
    </div>

    <!-- SECCIÓN FISCAL -->
    <div class="toggle-section">
    <label>
        <input type="checkbox" id="toggleFiscal" style="width:auto; margin-right:10px;"> 
        ¿Es Gasto con Crédito Fiscal?
    </label>
    
    <div id="camposFiscales" class="hidden form-grid">
        <div class="col">
            <label>RNC</label>
            <input type="text" name="rnc">
        </div>

        <div class="col">
            <label>NCF</label>
            <input type="text" name="ncf">
        </div>

        <div class="col">
            <label>ITBIS de compras y gastos</label>
            <input type="number" step="0.01" name="itbis" id="itbis" placeholder="0.00">
        </div>
    </div>
</div>

</div>


    <button type="submit" id="btnSubmit">Registrar Egreso</button>
    <div id="mensaje"></div>
</form>

	
</div>
</main>

<script>
  if (sessionStorage.getItem('session_active') !== 'true') {
      window.location.href = 'login.html';
  }

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQWIdDLqOI6VXljTGVM9fHNow5EwgbRJiElvjumlyMuWYfxPwjP6WQsgMuEPuLKQ2W/exec"; 
	const CONFIG_URL = 'https://script.google.com/macros/s/AKfycbxtFBNhe3YuVv0dZ65aw1l8HBC1pSUj5wCCq8WMAH4k0mqOSJ-dWqZD6pfzVyufbdVP/exec';
	
	async function cargarDatosConfiguracion() {
        try {
            const res = await fetch(CONFIG_URL);
            const data = await res.json();

            // Llenar selector de Sucursales
            const selectSuc = document.getElementById('Sucursal'); // Asegúrate que el ID sea minúscula 'sucursal'
            if (data.sucursal && selectSuc) {
                selectSuc.innerHTML = '<option value="">-- seleccionar sucursal --</option>';
                data.sucursal.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s.nombre;
                    opt.textContent = s.nombre;
                    selectSuc.appendChild(opt);
                });
            }

            // Llenar selector de Cuentas Contables
            const selectCue = document.querySelector('select[name="cuentaContable"]');
            if (data.cuenta && selectCue) {
                selectCue.innerHTML = '<option value="">-- seleccionar cuenta --</option>';
                data.cuenta.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c.nombre_cuenta;
                    opt.textContent = c.nombre_cuenta;
                    selectCue.appendChild(opt);
                });
            }
        } catch (e) {
            console.error("Error cargando configuración:", e);
        }
    }

    // Fecha por defecto hoy
    document.getElementById('fecha').valueAsDate = new Date();
    // CARGAR DATOS DINÁMICOS
    cargarDatosConfiguracion();
	const selectSuc = document.getElementById('sucursal');

    // Lógica para mostrar/ocultar campos fiscales
    const toggleFiscal = document.getElementById('toggleFiscal');
    const camposFiscales = document.getElementById('camposFiscales');
    const inputITBIS = document.getElementById('itbis');

    toggleFiscal.addEventListener('change', function() {
        if(this.checked) {
            camposFiscales.classList.remove('hidden');
        } else {
            camposFiscales.classList.add('hidden');
            inputITBIS.value = '';
        }
    });

    // Envío del Formulario
    const form = document.getElementById('formEgresos');
    const btnSubmit = document.getElementById('btnSubmit');
    const mensaje = document.getElementById('mensaje');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        btnSubmit.disabled = true;
        btnSubmit.textContent = "Guardando...";
        mensaje.textContent = "";

        // Calcular Subtotal antes de enviar
        const total = parseFloat(document.getElementById('total').value) || 0;
        const itbis = parseFloat(document.getElementById('itbis').value) || 0;
        const subtotal = total - itbis;

        // Convertir FormData a URLSearchParams para asegurar compatibilidad con Google Apps Script
        const formData = new FormData(form);
        const params = new URLSearchParams();
        params.append("action", "guardarRegistro");
        formData.forEach((value, key) => {
            params.append(key, value);
        });
        
        // Agregar el subtotal calculado manualmente
        params.append("subtotal", subtotal);

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: params, // Enviamos como application/x-www-form-urlencoded
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            });

            const data = await response.json();

            if (data.status === 'ok') {
                mensaje.className = 'success';
                mensaje.textContent = "✔ Registro guardado correctamente en la hoja.";
                form.reset();
                document.getElementById('fecha').valueAsDate = new Date();
                camposFiscales.classList.add('hidden');
            } else {
                throw new Error(data.message);
            }
        } catch (error) {
            mensaje.className = 'error';
            mensaje.textContent = "Error: " + error.message;
            console.error(error);
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Registrar Egreso";
        }
    });
</script>

<script src="script.js"></script>

</body>
</html>
